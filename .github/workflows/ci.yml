name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate JSONL data files
        run: |
          python -c "
          import json, os
          total = 0
          for f in sorted(os.listdir('data')):
              if not f.endswith('.jsonl'): continue
              count = 0
              with open(f'data/{f}') as fh:
                  for line in fh:
                      if line.strip():
                          json.loads(line)
                          count += 1
              total += count
          print(f'Validated {total} records across {len([f for f in os.listdir(\"data\") if f.endswith(\".jsonl\")])} files')
          "

      - name: Validate Python syntax
        run: |
          python -m py_compile src/guidance_experiment.py
          python -m py_compile notebooks/analysis.py
          echo "All Python files compile cleanly"

      - name: Run analysis script
        run: |
          pip install matplotlib numpy
          python notebooks/analysis.py
